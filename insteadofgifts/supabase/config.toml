# Supabase project configuration
# Reference: https://supabase.com/docs/guides/cli/config

[api]
# Port used by the local API server (supabase start)
port = 54321
# Schemas exposed via the REST and GraphQL API
schemas = ["public", "storage", "graphql_public"]
# Allow anonymous access for unauthenticated clients
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost"

[inbucket]
# Local email testing server
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:4200"
additional_redirect_urls = ["https://localhost:4200"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ---------------------------------------------------------------------------
# Edge Function configuration
# ---------------------------------------------------------------------------

# create-checkout-session: public endpoint — no user JWT required.
# Security is enforced by validating the campaign exists/is-active and by
# Stripe's own payment flow. The anon key is still accepted if passed.
[functions.create-checkout-session]
verify_jwt = false

# confirm-contribution: called by the campaign success redirect with a Stripe
# Checkout Session ID. No Supabase JWT required; Stripe session verification is
# done inside the function before writing to DB.
[functions.confirm-contribution]
verify_jwt = false

# create-paypal-order: public endpoint used to start hosted PayPal checkout.
[functions.create-paypal-order]
verify_jwt = false

# confirm-paypal-contribution: captures the approved PayPal order and marks the
# pending contribution as succeeded.
[functions.confirm-paypal-contribution]
verify_jwt = false

[functions.paypal-campaign-payment]
verify_jwt = false

[functions.confirm-paypal-campaign-payment]
verify_jwt = false

# stripe-campaign-payment: called by authenticated users to start a one-time
# campaign credit checkout.
[functions.stripe-campaign-payment]
# Keep gateway JWT check off; token is validated inside the function with
# supabase.auth.getUser(jwt), which avoids false "Invalid JWT" gateway rejects.
verify_jwt = false

# confirm-stripe-campaign-payment: called by the post-checkout success page with
# session_id. The function validates the user JWT and checkout session before
# adding a campaign credit.
[functions.confirm-stripe-campaign-payment]
verify_jwt = false

# stripe-webhook: called by Stripe, not by users. Stripe signs requests with
# STRIPE_WEBHOOK_SECRET which we verify inside the function.
[functions.stripe-webhook]
verify_jwt = false

# stripe-connect-onboard: called by authenticated organisers to start or resume
# Stripe Connect Express onboarding. JWT is required to identify the user.
[functions.stripe-connect-onboard]
verify_jwt = false

# stripe-connect-callback: called by authenticated organisers after returning
# from the Stripe Connect onboarding flow. JWT is required to identify the user.
[functions.stripe-connect-callback]
verify_jwt = false
